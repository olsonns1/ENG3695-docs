<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <style>
.line {
  fill: transparent;
  stroke: white;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 16px;
}
  </style>
  <defs>
    <g id="corner" class="line">
      <polyline points="10,35 10,10 35,10" />
    </g>
  </defs>
  <use href="#corner" x="0" y="0" />
  <use href="#corner" x="-100" y="0" style="transform: scale(-1, 1);" />
  <use href="#corner" x="0" y="-100" style="transform: scale(1, -1);" />
  <use href="#corner" x="-100" y="-100" style="transform: scale(-1, -1);" />
</svg>